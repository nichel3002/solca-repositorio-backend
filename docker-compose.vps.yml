name: solca-avance3-nupia

services:
  av3-postgres:
    image: postgres:16
    container_name: solca-av3-postgres
    environment:
      POSTGRES_USER: solca_av3
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solca_av3_2026}
      POSTGRES_DB: solca_admin
    volumes:
      - solca-av3-postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solca_av3 -d solca_admin"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  av3-paciente:
    build: ./paciente-maestro-service
    container_name: solca-av3-paciente
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://av3-postgres:5432/paciente_maestro_db
      SPRING_DATASOURCE_USERNAME: solca_av3
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-solca_av3_2026}
      JWT_SECRET: ${JWT_SECRET:-solca-avance3-secret-cambiar-en-vps}
    depends_on:
      av3-postgres:
        condition: service_healthy
    restart: unless-stopped

  av3-consulta:
    build: ./consulta-clinica-service
    container_name: solca-av3-consulta
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://av3-postgres:5432/consulta_clinica_db
      SPRING_DATASOURCE_USERNAME: solca_av3
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-solca_av3_2026}
      JWT_SECRET: ${JWT_SECRET:-solca-avance3-secret-cambiar-en-vps}
    depends_on:
      av3-postgres:
        condition: service_healthy
    restart: unless-stopped

  av3-laboratorio:
    build: ./laboratorio-clinico-service
    container_name: solca-av3-laboratorio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://av3-postgres:5432/laboratorio_clinico_db
      SPRING_DATASOURCE_USERNAME: solca_av3
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-solca_av3_2026}
      JWT_SECRET: ${JWT_SECRET:-solca-avance3-secret-cambiar-en-vps}
    depends_on:
      av3-postgres:
        condition: service_healthy
    restart: unless-stopped

  av3-imagenologia:
    build: ./imagenologia-service
    container_name: solca-av3-imagenologia
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://av3-postgres:5432/imagenologia_db
      SPRING_DATASOURCE_USERNAME: solca_av3
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-solca_av3_2026}
      JWT_SECRET: ${JWT_SECRET:-solca-avance3-secret-cambiar-en-vps}
    depends_on:
      av3-postgres:
        condition: service_healthy
    restart: unless-stopped

  av3-historia:
    build: ./historia-clinica-service
    container_name: solca-av3-historia
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://av3-postgres:5432/historia_clinica_db
      SPRING_DATASOURCE_USERNAME: solca_av3
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-solca_av3_2026}
      JWT_SECRET: ${JWT_SECRET:-solca-avance3-secret-cambiar-en-vps}
    depends_on:
      av3-postgres:
        condition: service_healthy
    restart: unless-stopped

  av3-repositorio:
    build: ./repositorio-clinico-regional-service
    container_name: solca-av3-repositorio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://av3-postgres:5432/repositorio_clinico_regional_db
      SPRING_DATASOURCE_USERNAME: solca_av3
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-solca_av3_2026}
      PACIENTE_SERVICE_URL: http://av3-paciente:8081
      CONSULTA_SERVICE_URL: http://av3-consulta:8082
      LABORATORIO_SERVICE_URL: http://av3-laboratorio:8083
      IMAGENOLOGIA_SERVICE_URL: http://av3-imagenologia:8084
      HISTORIA_SERVICE_URL: http://av3-historia:8086
      JWT_SECRET: ${JWT_SECRET:-solca-avance3-secret-cambiar-en-vps}
    ports:
      - "${BACKEND_PORT:-19085}:8085"
    depends_on:
      av3-paciente:
        condition: service_started
      av3-consulta:
        condition: service_started
      av3-laboratorio:
        condition: service_started
      av3-imagenologia:
        condition: service_started
      av3-historia:
        condition: service_started
    restart: unless-stopped

  av3-frontend:
    build: ../solca-repositorio-frontend
    container_name: solca-av3-frontend
    environment:
      API_PROXY_PASS: http://av3-repositorio:8085/
    ports:
      - "${FRONTEND_PORT:-19080}:80"
    depends_on:
      av3-repositorio:
        condition: service_started
    restart: unless-stopped

volumes:
  solca-av3-postgres-data:
